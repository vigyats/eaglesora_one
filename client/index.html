    <script>
      // Aggressively suppress Google Translate banner on all browsers including mobile
      function suppressGTBanner() {
        var selectors = [
          '.goog-te-banner-frame',
          '.VIpgJd-ZVi9od-aZ2wEe-wOHMyf',
          '.VIpgJd-ZVi9od-aZ2wEe',
          'iframe[name="google_translate_frame"]'
        ];
        selectors.forEach(function(sel) {
          var el = document.querySelector(sel);
          if (el) el.style.display = 'none';
        });
        document.body.style.top = '0px';
        document.body.style.position = 'static';
        document.documentElement.style.top = '0px';
      }
      var observer = new MutationObserver(suppressGTBanner);
      observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true });
      // Also run on load
      window.addEventListener('load', suppressGTBanner);
      document.addEventListener('DOMContentLoaded', suppressGTBanner);
    </script>
